<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="style.css" />
    <title>Document</title>
  </head>
  <body>
    <header class="container">
      <img src="images/logo.svg" alt="camp-in logo" class="logo-img">
    </header>
    <main>
      <div class="container">
        <div class="content">
          <div class="left">
            <div class="login">
              <div class="loginInfo">
                <div class="loginTxt">
                  <img class="logo" src="images/log-in.svg" alt="log-in" />
                  <h3 class="loginHeaderText">Login</h3>
                </div>
                <p class="insert">Insert your information below</p>
              </div>
  
              <form class="form" id="form">
                <div class="input-container">
                  <label for="email">E-mail</label>
                  <div class="input-wrapper">
                    <i class="input-icon email-icon"></i>
                    <input
                      type="email"
                      class="email email-input"
                      id="email"
                      placeholder="Type your email"
                      required
                    />
                  </div>
                </div>
  
                <div class="inputRow row">
                  <label for="password">Password</label>
                  <div class="input-wrapper password-wrapper">
                    <i class="input-icon lock-icon"></i>
                    <input type="password" class="password password-input" id="password" placeholder="Type your Password" pattern="(?=.*\d)(?=.*[a-z]).{8,12}" required />
                    <span class="material-symbols-outlined toggle-password-visibility" id="toggleIcon">visibility_off</span>
                  </div>
                </div>
  
                <div class="row lastRow">
                  <div class="remindMe">
                    <input type="checkbox" class="checkbox" id="checkbox">
                    <label for="checkbox" class="checkbox-label">Remind me</label>
                  </div>
                  <div class="forgot">
                    <a href="#"><p class="yellowHyperlink" >Forgot my password</p></a>
                  </div>
                </div>
  
                <button type="submit" class="loginButton" id="loginButton">LOGIN</button>
                <div class="row noAccount">
                  <a href="#"><p class="yellowHyperlink">Don't have an account? Sign up!</p></a>
                </div>
              </form>
            </div>
          </div>
          <div class="right">
            <img src="images/side-image.jpg"  alt="sideimg">
          </div>
        </div>
      </div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
